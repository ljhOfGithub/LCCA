version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: lcca_postgres
    environment:
      POSTGRES_DB: lcca_exam
      POSTGRES_USER: lcca_user
      POSTGRES_PASSWORD: lcca_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lcca_user -d lcca_exam"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lcca_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: lcca_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API port
      - "9001:9001"   # Console port
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc
    container_name: lcca_minio_mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/lcca-artifacts --ignore-existing;
      mc anonymous set download local/lcca-artifacts;
      exit 0;
      "

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lcca_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@lcca.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lcca_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://lcca_user:lcca_password@postgres:5432/lcca_exam
      SYNC_DATABASE_URL: postgresql://lcca_user:lcca_password@postgres:5432/lcca_exam
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: lcca-artifacts
      S3_REGION: us-east-1
      DEBUG: "true"
      # ── LLM provider (pick ONE) ──────────────────────────────────
      # Option A: Anthropic Claude
      ANTHROPIC_API_KEY: ""
      ANTHROPIC_MODEL: "claude-sonnet-4-6"
      # Option B: MiniMax (or any OpenAI-compatible)
      LLM_API_KEY: "sk-api-motj0siSdCkS4t-e17JTmB5C0J53sAwvdwXCkxQHhW9vnC7C5NdsCgzqJUhdLJQyXDsDgPW6xOdq41kHrNw6Q4l-V9QRDMMAGCAgNGZrl4g583wYDMplr88"
      LLM_BASE_URL: "https://api.minimax.chat/v1"
      LLM_MODEL: "MiniMax-Text-01"
      # ── ASR provider ─────────────────────────────────────────────
      # MiniMax ASR (Whisper-compatible endpoint)
      ASR_API_KEY: "sk-api-motj0siSdCkS4t-e17JTmB5C0J53sAwvdwXCkxQHhW9vnC7C5NdsCgzqJUhdLJQyXDsDgPW6xOdq41kHrNw6Q4l-V9QRDMMAGCAgNGZrl4g583wYDMplr88"
      ASR_API_URL: "https://api.minimax.chat/v1/audio/transcriptions"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  pgadmin_data: